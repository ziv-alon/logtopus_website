<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGTOPUS | Physical AI for Logistics</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
  --bg: #050a18;
  --surface: #0b1327;
  --surface2: #0f1a30;
  --cyan: #00e5ff;
  --green: #00e676;
  --blue: #1565c0;
  --blue-mid: #1e88e5;
  --text: #e8f0fe;
  --muted: #8899aa;
  --border: rgba(0,229,255,0.12);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* הגדלת הפונטים ב-20% על ידי שינוי גודל הבסיס */
html { 
  scroll-behavior: smooth; 
  font-size: 120%; 
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
h1,h2,h3,h4,h5 { font-family: 'Syne', sans-serif; }

/* ── Grid noise bg ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; width: 100%; z-index: 100;
  background: rgba(5,10,24,0.8);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: 1280px; margin: 0 auto;
  padding: 0 2rem;
  height: 68px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo img { height: 40px; width: auto; }
.nav-links {
  display: flex; gap: 2.5rem; align-items: center;
  list-style: none;
}
.nav-links a {
  color: var(--muted);
  text-decoration: none;
  font-size: .8rem;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  transition: color .2s;
}
.nav-links a:hover { color: var(--cyan); }
.nav-cta {
  background: linear-gradient(135deg, #00e5ff22, #00e67622);
  border: 1px solid var(--cyan);
  color: var(--cyan) !important;
  padding: .5rem 1.4rem;
  border-radius: 99px;
  font-size: .8rem !important;
  transition: background .2s, box-shadow .2s !important;
}
.nav-cta:hover {
  background: linear-gradient(135deg, #00e5ff33, #00e67633) !important;
  box-shadow: 0 0 20px rgba(0,229,255,0.3);
  color: #fff !important;
}
.hamburger { display: none; cursor: pointer; color: var(--text); font-size: 1.4rem; }
.mobile-menu {
  display: none;
  flex-direction: column;
  background: rgba(5,10,24,0.97);
  border-top: 1px solid var(--border);
  padding: 1.5rem 2rem;
  gap: 1.2rem;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  color: var(--muted); text-decoration: none;
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: .9rem; letter-spacing: .1em; text-transform: uppercase;
  transition: color .2s;
}
.mobile-menu a:hover { color: var(--cyan); }

/* ── HERO ── */
.hero {
  min-height: 100vh;
  display: flex; align-items: center;
  padding: 100px 2rem 4rem;
  position: relative; z-index: 1;
}
.hero-glow {
  position: absolute;
  top: 30%; left: 50%; transform: translate(-50%, -50%);
  width: 900px; height: 900px;
  background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.hero-inner {
  max-width: 1280px; margin: 0 auto; width: 100%;
  display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center;
}
.badge {
  display: inline-flex; align-items: center; gap: .6rem;
  background: rgba(0,229,255,0.07);
  border: 1px solid rgba(0,229,255,0.25);
  border-radius: 99px;
  padding: .4rem 1rem;
  font-size: .72rem; font-weight: 700;
  letter-spacing: .15em; text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 1.8rem;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)} }

.hero h1 {
  font-size: clamp(3rem, 6vw, 5.5rem);
  font-weight: 800;
  line-height: 1.05;
  color: #fff;
  margin-bottom: 1.2rem;
}
.hero h1 .accent {
  background: linear-gradient(135deg, var(--cyan), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero-sub {
  font-size: 1.4rem; font-weight: 300;
  color: var(--muted); margin-bottom: 1.2rem;
  font-style: italic;
}
.hero-desc {
  color: #9ab;
  line-height: 1.8; font-size: 1rem;
  max-width: 520px; margin-bottom: 2.5rem;
}
.btn-row { display: flex; gap: 1rem; flex-wrap: wrap; }
.btn-primary {
  background: #fff; color: #050a18;
  padding: .9rem 2.2rem; border-radius: 12px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
  text-decoration: none; display: inline-flex; align-items: center; gap: .5rem;
  transition: transform .2s, box-shadow .2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.15); }
.btn-outline {
  border: 1px solid rgba(255,255,255,0.15); color: var(--text);
  padding: .9rem 2.2rem; border-radius: 12px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
  text-decoration: none; display: inline-flex; align-items: center; gap: .5rem;
  transition: background .2s, border-color .2s;
}
.btn-outline:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }

.hero-img-wrap {
  position: relative;
}
.hero-img-wrap::before {
  content: '';
  position: absolute; inset: -3px;
  background: linear-gradient(135deg, rgba(0,229,255,0.3), rgba(0,230,118,0.2));
  border-radius: 20px; z-index: 0;
  filter: blur(20px); opacity: .6;
}
.hero-img-wrap img {
  position: relative; z-index: 1;
  width: 100%; border-radius: 16px;
  border: 1px solid rgba(0,229,255,0.2);
  display: block;
}
.hero-stats {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
  background: rgba(5,10,24,0.75);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(0,229,255,0.15);
  border-radius: 0 0 16px 16px;
  display: flex; justify-content: space-around; padding: .9rem;
}
.hero-stat { text-align: center; }
.hero-stat .val { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--cyan); }
.hero-stat .lbl { font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }

/* ── SECTION COMMON ── */
section { position: relative; z-index: 1; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
.section-tag {
  font-family: 'Syne', sans-serif; font-size: .72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .18em;
  margin-bottom: 1rem;
}
.section-title {
  font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 800; color: #fff; margin-bottom: 1rem;
}
.section-sub { color: var(--muted); font-size: 1.05rem; line-height: 1.7; max-width: 600px; }

/* ── PROBLEM ── */
.problem { padding: 7rem 0; background: var(--surface); }
.cards-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; margin-top: 3.5rem; }
.card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  transition: border-color .3s, transform .3s, box-shadow .3s;
}
.card:hover {
  border-color: rgba(0,229,255,0.35);
  transform: translateY(-5px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(0,229,255,0.05);
}
.card-icon {
  width: 52px; height: 52px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.5rem;
  font-size: 1.3rem;
}
.card-icon.red { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.2); color: #ef5350; }
.card h4 { font-size: 1.15rem; color: #fff; margin-bottom: .6rem; }
.card p { color: var(--muted); font-size: .92rem; line-height: 1.75; }

/* ── VISION ── */
.vision { padding: 7rem 0; }
.vision-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
.vision-img-wrap { position: relative; }
.vision-img-wrap::after {
  content: '';
  position: absolute; inset: -20px;
  background: radial-gradient(circle, rgba(0,229,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.vision-img-wrap img {
  width: 100%; border-radius: 16px;
  border: 1px solid rgba(0,229,255,0.15);
}
.vision-points { display: flex; flex-direction: column; gap: 2rem; margin-top: 2.5rem; }
.vpoint { display: flex; gap: 1.2rem; align-items: flex-start; }
.vpoint-icon {
  flex-shrink: 0; width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; margin-top: 2px;
}
.vpoint-icon.blue { background: rgba(21,101,192,0.2); border: 1px solid rgba(21,101,192,0.4); color: var(--blue-mid); }
.vpoint-icon.green { background: rgba(0,230,118,0.1); border: 1px solid rgba(0,230,118,0.3); color: var(--green); }
.vpoint h4 { color: #fff; font-size: 1.05rem; margin-bottom: .3rem; }
.vpoint p { color: var(--muted); font-size: .9rem; line-height: 1.7; }

/* ── METRICS ── */
.metrics { padding: 7rem 0; background: var(--surface); }
.metrics-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-top: 3rem; }
.metric-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 16px; padding: 2rem 1.5rem; text-align: center;
  transition: border-color .3s;
}
.metric-box:hover { border-color: rgba(0,229,255,0.35); }
.metric-val {
  font-family: 'Syne', sans-serif;
  font-size: 3rem; font-weight: 800;
  background: linear-gradient(135deg, var(--cyan), var(--green));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: block; margin-bottom: .4rem;
}
.metric-lbl { font-size: .72rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }
.features-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; margin-top: 3rem; }
.feat-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 16px; padding: 2rem;
  transition: border-color .3s, transform .3s;
}
.feat-card:hover { border-color: rgba(0,229,255,0.35); transform: translateY(-3px); }
.feat-icon { font-size: 1.5rem; color: var(--cyan); margin-bottom: 1rem; }
.feat-card h4 { color: #fff; font-size: 1rem; margin-bottom: .5rem; }
.feat-card p { color: var(--muted); font-size: .88rem; line-height: 1.7; }

/* ── ROADMAP ── */
.roadmap { padding: 7rem 0; }
.road-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 3rem; }
.road-card {
  border-radius: 20px; padding: 2.5rem;
  border: 1px solid var(--border);
}
.road-card.phase1 { background: linear-gradient(135deg, #0b1327, #0f1f3a); }
.road-card.phase2 { background: linear-gradient(135deg, rgba(21,101,192,0.15), #0b1327); border-color: rgba(21,101,192,0.3); }
.phase-tag {
  font-family: 'Syne', sans-serif; font-size: .72rem; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase; margin-bottom: 1.2rem;
}
.phase-tag.c1 { color: var(--cyan); }
.phase-tag.c2 { color: #9c27b0; }
.road-card h3 { font-size: 1.6rem; color: #fff; margin-bottom: 1rem; }
.road-card p { color: var(--muted); line-height: 1.8; }

/* ── TRACTION ── */
.traction { padding: 7rem 0; background: var(--surface); }
.traction-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
.traction-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
.traction-item {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.2rem 1.5rem;
  display: flex; gap: 1rem; align-items: center;
}
.t-icon { font-size: 1.2rem; flex-shrink: 0; }
.t-icon.blue { color: var(--blue-mid); }
.t-icon.green { color: var(--green); }
.t-text h4 { color: #fff; font-size: .95rem; margin-bottom: .2rem; }
.t-text p { color: var(--muted); font-size: .85rem; }
.t-text strong { color: var(--text); }

/* Team card */
.team-card {
  background: linear-gradient(145deg, var(--surface2), var(--surface));
  border: 1px solid rgba(0,229,255,0.15);
  border-radius: 24px; padding: 3rem 2rem;
  text-align: center;
}
.team-photo {
  width: 120px; height: 120px; border-radius: 50%;
  border: 3px solid rgba(0,229,255,0.3);
  overflow: hidden; margin: 0 auto 1.5rem;
  box-shadow: 0 0 30px rgba(0,229,255,0.15);
}
.team-photo img { width: 100%; height: 100%; object-fit: cover; }
.team-name { font-size: 1.6rem; color: #fff; margin-bottom: .3rem; }
.team-role { color: var(--cyan); font-size: .9rem; margin-bottom: 1rem; }
.team-bio { color: var(--muted); font-size: .9rem; line-height: 1.75; margin-bottom: 1.5rem; }
.social-links { display: flex; justify-content: center; gap: 1rem; }
.social-links a { color: var(--muted); font-size: 1.3rem; transition: color .2s; }
.social-links a:hover { color: var(--cyan); }

/* ── FOOTER ── */
footer {
  padding: 5rem 2rem 3rem;
  border-top: 1px solid var(--border);
  text-align: center;
}
footer h2 { font-size: 2rem; color: #fff; margin-bottom: .8rem; }
footer p { color: var(--muted); margin-bottom: 2rem; }
.footer-cta {
  display: inline-block;
  background: linear-gradient(135deg, var(--cyan), var(--green));
  color: #050a18;
  padding: .9rem 2.5rem; border-radius: 99px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
  text-decoration: none;
  transition: opacity .2s, transform .2s;
}
.footer-cta:hover { opacity: .9; transform: translateY(-2px); }
.footer-copy { color: #334; font-size: .8rem; margin-top: 3rem; }

/* ── SCROLL ANIMATIONS ── */
.reveal {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity .7s ease, transform .7s ease;
}
.reveal.visible {
  opacity: 1;
  transform: none;
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .nav-links { display: none; }
  .hamburger { display: block; }
  .hero-inner { grid-template-columns: 1fr; gap: 3rem; }
  .hero-img-wrap { order: -1; }
  .vision-inner { grid-template-columns: 1fr; }
  .cards-3, .features-3 { grid-template-columns: 1fr; }
  .metrics-grid { grid-template-columns: repeat(2,1fr); }
  .road-grid { grid-template-columns: 1fr; }
  .traction-inner { grid-template-columns: 1fr; }
}
@media (max-width: 500px) {
  .metrics-grid { grid-template-columns: 1fr 1fr; }
  .hero h1 { font-size: 3.12rem; } /* הותאם ל-20% יותר (2.6 * 1.2) */
}
</style>
</head>
